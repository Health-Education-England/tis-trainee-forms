application:
  environment: ${ENVIRONMENT:local}
  file-store:
    bucket: ${APPLICATION_FILESTORE_BUCKET:}
  aws:
    sns:
      pdf-generated: ${PDF_GENERATED_TOPIC:}
      formr-file-event: ${FORMR_FILE_EVENT_TOPIC:}
      formr-refresh: ${FORMR_REFRESH_TOPIC:}
      formr-updated: ${FORMR_UPDATE_TOPIC:}
      ltft-assignment-updated: ${LTFT_ASSIGNMENT_UPDATE_TOPIC:}
      ltft-refresh: ${LTFT_REFRESH_TOPIC:}
      ltft-status-updated: ${LTFT_STATUS_UPDATE_TOPIC:}
      ltft-content-updated: ${LTFT_CONTENT_UPDATE_TOPIC:}
    sqs:
      coj-received: ${COJ_RECEIVED_QUEUE:}
      notification-event: ${NOTIFICATION_EVENT_QUEUE:}
      profile-move: ${PROFILE_MOVE_QUEUE:}
  review-workflows:
    "1-1RSSQ6R": # DBC code as the map key (Thames Valley)
      - label: "Programme/Education Team Triage"
        enabled: true
      - label: "Programme Manager Review"
        enabled: true
      - label: "Associate Dean Approval"
        enabled: true
    "1-1RUZUSF": # DBC code as the map key (Wessex)
      - label: "Programme/Education Team Triage"
        enabled: false
      - label: "Education Team Review"
        enabled: true
      - label: "APD Approval"
        enabled: true
    "1-1RUZV1D": # DBC code as the map key (KSS, if they had a one-step review)
      - label: "Completeness checks"
        enabled: true
    "1-1RSSPZ7": # East Midlands (if they had, but no longer have, a one-step review)
      - label: "Programme/Education Team Triage"
        enabled: false
  schedules:
    publish-all-formr-partas: "-"
    publish-all-formr-partbs: "-"
    publish-all-ltfts: "@monthly"
  signature:
    secret-key: ${SIGNATURE_SECRET_KEY}
  timezone: Europe/London

features:
  formr-partb:
    covid-declaration: ${FEATURE_FORMR_PARTB_COVID_DECLARATION:false}

logging:
  level:
    root: INFO
    com.openhtmltopdf.cssparse: ERROR
    org.springframework.data: INFO
    uk.nhs.hee.tis.trainee.forms: INFO

mongock:
  migration-scan-package: uk.nhs.hee.tis.trainee.forms.migration

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${application.environment}

server:
  port: 8207
  servlet:
    context-path: /forms

spring:
  data:
    mongodb:
      uri: mongodb://${DB_USER:admin}:${DB_PASSWORD:pwd}@${DB_HOST:localhost}:${DB_PORT:27017}/${DB_NAME:forms}?authSource=admin&retryWrites=false
      auto-index-creation: true
      uuid-representation: standard

com:
  amazonaws:
    xray:
      emitters:
        daemon-address: ${AWS_XRAY_DAEMON_ADDRESS:}
      strategy:
        tracing-name: ${AWS_XRAY_TRACING_NAME:tis-trainee-forms-${application.environment}}
